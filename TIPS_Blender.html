// Format dollars
function fmtDollar(v) {
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(v >= 1e4 ? 1 : 2) + 'K';
  return '$' + v.toFixed(2);
}

function parseDollar(str) {
  const cleaned = str.replace(/[^0-9.]/g, '');
  return parseFloat(cleaned) || 0;
}

function formatDollarInput(v) {
  if (!v || v === 0) return '';

// Calculations
function calcFundStats(fund) {
  const rows = holdings.filter(h => h[0] === fund);
  let wam = 0, wRytm = 0, wRdur = 0, wCpn = 0;
  rows.forEach(([, cusip, wt]) => {
    const u = universe[cusip]; if (!u) return;
    const w = wt / 100;
    wam += w * u.ytm; wRytm += w * u.rytm; wRdur += w * u.rdur; wCpn += w * u.cpn;
  });
  return { wam, rytm: wRytm, rdur: wRdur, cpn: wCpn, er: EXPENSE_RATIOS[fund] };
}

const fundStats = { STIP: calcFundStats('STIP'), DFIP: calcFundStats('DFIP'), LTPZ: calcFundStats('LTPZ') };
const sorted = ['STIP','DFIP','LTPZ'].sort((a,b) => fundStats[a].wam - fundStats[b].wam);

function solve2Fund(target) {
  const wams = sorted.map(f => fundStats[f].wam);
  if (target <= wams[0]) return { [sorted[0]]: 100, [sorted[1]]: 0, [sorted[2]]: 0 };
  if (target >= wams[2]) return { [sorted[0]]: 0, [sorted[1]]: 0, [sorted[2]]: 100 };
  if (target <= wams[1]) {
    const w0 = (wams[1] - target) / (wams[1] - wams[0]);
    return { [sorted[0]]: +(w0*100).toFixed(2), [sorted[1]]: +((1-w0)*100).toFixed(2), [sorted[2]]: 0 };
  }
  const w1 = (wams[2] - target) / (wams[2] - wams[1]);
  return { [sorted[0]]: 0, [sorted[1]]: +(w1*100).toFixed(2), [sorted[2]]: +((1-w1)*100).toFixed(2) };
}

function solve3Fund(target, anchorFund, anchorPct) {
  const others = ['STIP','DFIP','LTPZ'].filter(f => f !== anchorFund);
  const remaining = 100 - anchorPct;
  if (remaining <= 0) return { [anchorFund]: 100, [others[0]]: 0, [others[1]]: 0 };
  const adjTarget = (target - (anchorPct/100) * fundStats[anchorFund].wam) / (remaining/100);
  const w0 = fundStats[others[0]].wam, w1 = fundStats[others[1]].wam;
  const lo = Math.min(w0,w1), hi = Math.max(w0,w1);
  const loFund = w0 < w1 ? others[0] : others[1];
  const hiFund = w0 < w1 ? others[1] : others[0];
  if (adjTarget <= lo) return { [anchorFund]: anchorPct, [loFund]: remaining, [hiFund]: 0 };
  if (adjTarget >= hi) return { [anchorFund]: anchorPct, [loFund]: 0, [hiFund]: remaining };
  const pLo = (hi - adjTarget) / (hi - lo);
  return { [anchorFund]: anchorPct, [loFund]: +(pLo * remaining).toFixed(2), [hiFund]: +((1 - pLo) * remaining).toFixed(2) };
}

function blendPortfolio(weights) {
  const combined = {};
  holdings.forEach(([fund, cusip, wt]) => {
    const contrib = (weights[fund] / 100) * (wt / 100);
    if (!combined[cusip]) combined[cusip] = { cusip, weight: 0, sources: {} };
    combined[cusip].weight += contrib;
    combined[cusip].sources[fund] = (combined[cusip].sources[fund] || 0) + (weights[fund] / 100) * wt;
  });
  return Object.values(combined).filter(c => c.weight > 0.00005)
    .sort((a, b) => (universe[a.cusip]?.ytm || 0) - (universe[b.cusip]?.ytm || 0));
}

function portfolioStats(blend, weights) {
  let wam = 0, rytm = 0, rdur = 0;
  blend.forEach(({ cusip, weight }) => {
    const u = universe[cusip]; if (!u) return;
    wam += weight * u.ytm; rytm += weight * u.rytm; rdur += weight * u.rdur;
  });
  // Weighted expense ratio
  let wtdER = 0;
  ['STIP','DFIP','LTPZ'].forEach(f => { wtdER += (weights[f] / 100) * EXPENSE_RATIOS[f]; });
  const netYtm = rytm - wtdER;
  return { wam, rytm, rdur, wtdER, netYtm };
}

function maturityBuckets(blend) {
  const b = { '0-2yr': 0, '2-5yr': 0, '5-10yr': 0, '10-20yr': 0, '20-30yr': 0 };

    const ytm = universe[cusip]?.ytm || 0;
    if (ytm < 2) b['0-2yr'] += weight;
    else if (ytm < 5) b['2-5yr'] += weight;
    else if (ytm < 10) b['5-10yr'] += weight;
    else if (ytm < 20) b['10-20yr'] += weight;
    else b['20-30yr'] += weight;
  });
  return Object.entries(b).map(([name, value]) => ({ name, value: +(value * 100).toFixed(2) }));
}

function exportCSV(blend, weights, target, stats, dollars) {
  let csv = 'CUSIP,Maturity,Coupon,Weight,Dollar Amount,Real YTM,Real Duration,Sources\n';
  blend.forEach(({ cusip, weight, sources }) => {
    const u = universe[cusip] || {};
    const src = Object.entries(sources).map(([f,w]) => f + ':' + w.toFixed(2) + '%').join(' + ');
    const dolAmt = dollars > 0 ? (weight * dollars).toFixed(2) : '';
    csv += cusip + ',' + (u.mat||'') + ',' + (u.cpn||'') + ',' + (weight*100).toFixed(2) + '%,' + dolAmt + ',' + (u.rytm||'') + ',' + (u.rdur||'') + ',"' + src + '"\n';
  });
  csv += '\nSummary\n';
  csv += 'WAM,' + stats.wam.toFixed(2) + ' yrs\n';
  csv += 'Real YTM (Gross),' + stats.rytm.toFixed(2) + '%\n';
  csv += 'Wtd Expense Ratio,' + stats.wtdER.toFixed(3) + '%\n';
  csv += 'Real YTM (Net),' + stats.netYtm.toFixed(2) + '%\n';
  csv += 'Real Duration,' + stats.rdur.toFixed(2) + '\n';
  if (dollars > 0) csv += 'Portfolio Size,$' + dollars.toLocaleString('en-US') + '\n';
  csv += '\nFund Weights\n';
  ['STIP','DFIP','LTPZ'].forEach(f => {
    const d = dollars > 0 ? ',$' + (weights[f]/100*dollars).toFixed(2) : '';
    csv += f + ',' + weights[f].toFixed(2) + '%' + d + ',ER ' + EXPENSE_RATIOS[f].toFixed(2) + '%\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'TIPS_Blend_WAM' + target.toFixed(1) + '.csv';
  a.click();
}

// Rendering
function render() {
  const { target, mode, anchor, anchorPct, dollars } = state;
  const weights = mode === '2fund' ? solve2Fund(target) : solve3Fund(target, anchor, anchorPct);
  const blend = blendPortfolio(weights);
  const stats = portfolioStats(blend, weights);
  const buckets = maturityBuckets(blend);

  // Fund WAMs
  document.getElementById('fundWams').innerHTML = '<div class="card-label">Fund WAMs</div><div class="fund-row">' +
    ['STIP','DFIP','LTPZ'].map(f =>
      '<div class="fund-chip"><span class="fund-dot" style="background:' + COLORS[f] + '"></span>' +
      '<span class="fund-name">' + f + '</span>' +
      '<span>' + fundStats[f].wam.toFixed(2) + ' yrs</span>' +
      '<span class="fund-detail">| YTM ' + fundStats[f].rytm.toFixed(2) + '% | Dur ' + fundStats[f].rdur.toFixed(2) + ' | ER ' + EXPENSE_RATIOS[f].toFixed(2) + '%</span></div>'
    ).join('') + '</div>';

  // Controls
  const minWAM = fundStats[sorted[0]].wam;
  const maxWAM = fundStats[sorted[2]].wam;
  let ctrlHTML = '<div class="ctrl-row"><span class="ctrl-label">Target WAM:</span>' +
    '<input type="range" id="wamSlider" min="' + Math.floor(minWAM) + '" max="' + Math.ceil(maxWAM) + '" step="0.1" value="' + target + '">' +
    '<input type="number" id="wamNum" min="0" max="30" step="0.1" value="' + target + '">' +
    '<span class="unit">years</span></div>';
  ctrlHTML += '<div class="preset-row">' + [3,5,7,10,15,20].map(y =>
    '<button class="preset-btn' + (Math.abs(target-y)<0.05 ? ' active' : '') + '" data-yr="' + y + '">' + y + 'yr</button>'
  ).join('') + '</div>';
  ctrlHTML += '<div class="ctrl-row"><span class="ctrl-label">Mode:</span>' +
    '<button class="mode-btn' + (mode==='2fund' ? ' active' : '') + '" data-mode="2fund">2-Fund (Auto)</button>' +
    '<button class="mode-btn' + (mode==='3fund' ? ' active' : '') + '" data-mode="3fund">3-Fund (Anchor)</button>';
  if (mode === '3fund') {
    ctrlHTML += '<div class="anchor-controls">' +
      '<select id="anchorSelect"><option value="STIP"' + (anchor==='STIP'?' selected':'') + '>Anchor STIP</option>' +
      '<option value="DFIP"' + (anchor==='DFIP'?' selected':'') + '>Anchor DFIP</option>' +
      '<option value="LTPZ"' + (anchor==='LTPZ'?' selected':'') + '>Anchor LTPZ</option></select>' +
      '<span class="unit">at</span><input type="number" id="anchorPctNum" min="0" max="100" step="1" value="' + anchorPct + '" style="width:60px">' +
      '<span class="unit">%</span></div>';
  }
  ctrlHTML += '</div>';
  ctrlHTML += '<div class="ctrl-row"><span class="ctrl-label">Portfolio $:</span>' +
    '<input type="text" id="dollarInput" class="dollar-input" value="' + (dollars > 0 ? formatDollarInput(dollars) : '') + '" placeholder="e.g. 500,000">' +
    '</div>';
  document.getElementById('controls').innerHTML = ctrlHTML;

  // Allocation
  let allocHTML = '<div class="card-label">Fund Allocation</div><div class="alloc-bar">';
  ['STIP','DFIP','LTPZ'].forEach(f => {
    if (weights[f] > 0) {
      const label = weights[f] >= 5 ? (f + ' ' + weights[f].toFixed(1) + '%') : weights[f] >= 2 ? (weights[f].toFixed(0) + '%') : '';
      allocHTML += '<div class="alloc-seg" style="width:' + weights[f] + '%;background:' + COLORS[f] + ';min-width:' + (weights[f]>0?40:0) + 'px">' + label + '</div>';
    }
  });
  allocHTML += '</div><div class="alloc-grid">';
  ['STIP','DFIP','LTPZ'].forEach(f => {
    const dolStr = dollars > 0 ? fmtDollar(weights[f] / 100 * dollars) : '';
    allocHTML += '<div><div class="alloc-fund-label">' + f + ' <span style="font-size:10px;color:#9ca3af">(ER ' + EXPENSE_RATIOS[f].toFixed(2) + '%)</span></div>' +
      '<div class="alloc-fund-val" style="color:' + (weights[f]>0?COLORS[f]:'#9ca3af') + '">' + weights[f].toFixed(1) + '%</div>' +
      (dolStr ? '<div class="alloc-fund-dollar">' + dolStr + '</div>' : '') +
      '</div>';
  });
  allocHTML += '</div>';
  document.getElementById('allocation').innerHTML = allocHTML;

  // Stats
  let statsHTML = '<div class="card-label">Blended Portfolio Stats</div><div class="stats-grid">' +
    '<div><div class="stat-label">Wtd Avg Maturity</div><div class="stat-val">' + stats.wam.toFixed(2) + '<span class="stat-unit">yrs</span></div></div>' +
    '<div><div class="stat-label">Real YTM (Gross)</div><div class="stat-val">' + stats.rytm.toFixed(2) + '<span class="stat-unit">%</span></div></div>' +
    '<div><div class="stat-label">Wtd Expense Ratio</div><div class="stat-val">' + stats.wtdER.toFixed(3) + '<span class="stat-unit">%</span></div></div>' +
    '<div><div class="stat-label">Real YTM (Net)</div><div class="stat-val net-highlight">' + stats.netYtm.toFixed(2) + '<span class="stat-unit">%</span></div>' +
    (dollars > 0 ? '<div class="stat-sub">' + fmtDollar(stats.netYtm / 100 * dollars) + '/yr</div>' : '') + '</div>' +
    '<div><div class="stat-label">Real Duration</div><div class="stat-val">' + stats.rdur.toFixed(2) + '<span class="stat-unit">yrs</span></div></div>' +
    '</div>';
  if (dollars > 0) {
    statsHTML += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #f3f4f6;display:flex;gap:32px;justify-content:center">' +
      '<div style="text-align:center"><div class="stat-label">Portfolio Size</div><div style="font-size:20px;font-weight:700">' + fmtDollar(dollars) + '</div></div>' +
      '<div style="text-align:center"><div class="stat-label">Holdings</div><div style="font-size:20px;font-weight:700">' + blend.length + '</div></div>' +
      '</div>';
  }
  document.getElementById('stats').innerHTML = statsHTML;

  // Chart
  const maxBucket = Math.max(...buckets.map(b => b.value), 1);
  document.getElementById('chart').innerHTML = buckets.map((b, i) => {
    const dolLabel = dollars > 0 ? '<div style="font-size:10px;color:#6b7280">' + fmtDollar(b.value / 100 * dollars) + '</div>' : '';
    return '<div class="chart-col"><div class="chart-bar-label">' + b.value.toFixed(1) + '%</div>' +
      dolLabel +
      '<div class="chart-bar" style="height:' + (b.value / maxBucket * 130) + 'px;background:' + BUCKET_COLORS[i] + '"></div>' +
      '<div class="chart-bar-xlabel">' + b.name + '</div></div>';
  }).join('');

  // Table
  let tblHTML = '<div class="tbl-header"><div class="card-label" style="margin-bottom:0">Holdings Detail</div>' +
    '<button class="export-btn" id="exportBtn">Export CSV</button></div><div class="tbl-wrap"><table><thead><tr>' +
    '<th>CUSIP</th><th>Maturity</th><th class="r">Coupon</th><th class="r">Weight</th>' +
    (dollars > 0 ? '<th class="r">$ Amount</th>' : '') +
    '<th class="r">Real YTM</th><th class="r">Real Dur</th><th>Sources</th></tr></thead><tbody>';
  blend.forEach(({ cusip, weight, sources }) => {
    const u = universe[cusip] || {};
    let tags = '';
    Object.entries(sources).forEach(([f, w]) => {
      tags += '<span class="tag" style="background:' + COLORS[f] + '">' + f + ' ' + w.toFixed(1) + '%</span>';
    });
    tblHTML += '<tr><td class="mono">' + cusip + '</td><td>' + (u.mat||'') + '</td>' +
      '<td class="r">' + (u.cpn != null ? u.cpn.toFixed(2) + '%' : '') + '</td>' +
      '<td class="r bold">' + (weight * 100).toFixed(2) + '%</td>' +
      (dollars > 0 ? '<td class="r">' + fmtDollar(weight * dollars) + '</td>' : '') +
      '<td class="r">' + (u.rytm != null ? u.rytm.toFixed(2) + '%' : '') + '</td>' +
      '<td class="r">' + (u.rdur != null ? u.rdur.toFixed(2) : '') + '</td>' +
      '<td>' + tags + '</td></tr>';
  });
  tblHTML += '</tbody></table></div>';
  document.getElementById('tableCard').innerHTML = tblHTML;

  // Bind events
  document.getElementById('wamSlider').addEventListener('input', e => { state.target = +e.target.value; render(); });
  document.getElementById('wamNum').addEventListener('change', e => { state.target = Math.max(0, Math.min(30, +e.target.value)); render(); });
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.target = +btn.dataset.yr; render(); });
  });
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.mode = btn.dataset.mode; render(); });
  });
  if (document.getElementById('anchorSelect')) {
    document.getElementById('anchorSelect').addEventListener('change', e => { state.anchor = e.target.value; render(); });
  }
  if (document.getElementById('anchorPctNum')) {
    document.getElementById('anchorPctNum').addEventListener('change', e => { state.anchorPct = Math.max(0, Math.min(100, +e.target.value)); render(); });
  }
  document.getElementById('dollarInput').addEventListener('change', e => {
    state.dollars = parseDollar(e.target.value);
    render();
  });
  document.getElementById('exportBtn').addEventListener('click', () => exportCSV(blend, weights, target, stats, dollars));
}

render();
</script>
</body>
</html>
